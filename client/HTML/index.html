<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Login Form Design One | patuboca</title>
    <link rel="stylesheet" href="/CSS/estilos.css">
  </head>
  <body>

    <div class="login-box">
      <img src="IMG/log.png" class="avatar" alt="logo de patuboca">
      <h1>Login</h1>
      <form>
        <!-- USERNAME INPUT -->
        <label for="Nombre de usuario">Username</label>
        <input type="text" placeholder="Nombre de usuario">

        <!-- PASSWORD INPUT -->
        <label for="password">Password</label>

        <input type="Contraseña" placeholder="Aqui la contraseña">
        <input type="submit" value="Log In">
        
      </form>
    </div>
  </body>
</html>
