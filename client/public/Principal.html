<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>♥ Pa'TuBoca</title>
    <link rel="stylesheet" href="./CSS/estilosprincipal.css">
    <!-- Biblioteca de iconos Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <!-- Fuentes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>
<body>
    <div class="Fondo"></div>

    <!--Encabezado titulo-->
    <header>

        <div class="Marca"><h1>Pa'TuBoca</h1><p>Delicias y más</p></div>

        <!-- Botón para añadir ventas y logo -->
        <div class="Header">
            <button class="btnVenta">
                <i class="fa-solid fa-plus"></i>
                Añadir venta
            </button>
            <a href="Entrada.html">
            <img src="Resources/Logo.png" alt="Logo de Pa'TuBoca" class="logoEmpresa">
            </a>
        </div>

    </header>

    <!--Contenido bajo el header de las funciones -->
    <main>

        <h2 class="saludo">TODO LISTO PARA TRABAJAR HOY</h2>

        <!-- Gestión -->
        <section>

            <h3 class="tituloSeccion">GESTIÓN</h3>
            <div class="contenedor">

                <!-- Tarjeta Productos -->
                <a href="#" class="card">
                    <div class="icono"><i class="fa-solid fa-box-open"></i></div>
                    <span>Productos</span>
                    <i class="fa-solid fa-chevron-right flecha"></i>
                </a>

                <!-- Tarjeta Ingredientes -->
                <a href="#" class="card">
                    <div class="icono"><i class="fa-solid fa-carrot"></i></div>
                    <span>Ingredientes</span>
                    <i class="fa-solid fa-chevron-right flecha"></i>
                </a>

                <!-- Tarjeta Recetas -->
                <a href="#" class="card">
                    <div class="icono"><i class="fa-solid fa-book-open"></i></div>
                    <span>Recetas</span>
                    <i class="fa-solid fa-chevron-right flecha"></i>
                </a>

            </div>

        </section>

        <!--Panel de control -->
        <section>

            <h3 class="tituloSeccion">TABLERO DE CONTROL</h3>
            <div class="contenedor">

                <!-- Tarjeta Ventas -->
                <a href="#" class="card">
                    <div class="icono"><i class="fa-solid fa-cash-register"></i></div>
                    <span>Ventas</span>
                    <i class="fa-solid fa-chevron-right flecha"></i>
                </a>

                <!-- Tarjeta Costos y Rentabilidad -->
                <a href="" class="card">
                    <div class="icono"><i class="fa-solid fa-chart-line"></i></div>
                    <span>Costos Y Rentabilidad</span>
                    <i class="fa-solid fa-chevron-right flecha"></i>
                </a>

            </div>

        </section>
        
    </main>
