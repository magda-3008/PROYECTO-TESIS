<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Productos</title>
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet" />
    <!-- Bootstrap Table CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/bootstrap-table@1.24.2/dist/bootstrap-table.min.css" />
  </head>
  <body>
    <h1>Inventario de productos</h1>

    <form action="" method="GET">
      <input
        type="search"
        id="buscar-producto"
        name="buscar-producto"
        placeholder="Escribe aquí el nombre del producto (ejm: pioquinto)"
        style="width: 400px" />
      <button type="button">Buscar</button>
    </form>

    <p>Filtrar por:</p>
    <select name="tipo-prod" id="tipo-prod">
      <option value="">Tipo de producto</option>
    </select>

    <table
      id="tabla"
      class="table"
      data-toggle="table"
      data-pagination="true"
      data-page-size="10">
      <thead>
        <tr>
          <th scope="col">Nº</th>
          <th scope="col">Nombre</th>
          <th scope="col">Tipo</th>
          <th scope="col">Precio</th>
          <th scope="col">Margen de ganancia bruta</th>
          <th scope="col">Estado</th>
        </tr>
      </thead>

      <tbody id="tablaProductos"></tbody>
    </table>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Bootstrap Table -->
    <script src="https://unpkg.com/bootstrap-table@1.24.2/dist/bootstrap-table.min.js"></script>

    <script src="./JavaScript/productos.js"></script>
  </body>
</html>
