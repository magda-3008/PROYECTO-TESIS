<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Productos</title>
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet" />
    <!-- DataTables -->
    <link
      rel="stylesheet"
      href="https://cdn.datatables.net/2.3.2/css/dataTables.bootstrap5.css" />
    <link rel="stylesheet" href="./CSS/estilostablaprod.css" />
  </head>
  <body>
    <h1>Inventario de productos</h1>

    <form action="" method="GET">
      <input
        type="search"
        id="buscar-producto"
        name="buscar-producto"
        placeholder="Escribe aquí el nombre del producto (ejm: pioquinto)"
        style="width: 400px" />
      <button type="button">Buscar</button>
    </form>

    <p>Filtrar por:</p>
    <select name="tipo-prod" id="tipo-prod">
      <option value="">Tipo de producto</option>
    </select>

    <table id="tabla-container" class="table table-striped table-hover">
      <thead>
        <tr>
          <th>N°</th>
          <th>Nombre</th>
          <th>Tipo</th>
          <th>Precio</th>
          <th>Margen de ganancia bruta</th>
          <th>Estado</th>
        </tr>
      </thead>

      <tbody id="tablaProductos"></tbody>
    </table>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://cdn.datatables.net/2.3.2/js/dataTables.js"></script>

    <script src="https://cdn.datatables.net/2.3.2/js/dataTables.bootstrap5.js"></script>

    <script src="./JavaScript/productos.js"></script>
  </body>
</html>
