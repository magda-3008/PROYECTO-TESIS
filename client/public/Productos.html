<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Productos</title>
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet" />
    <!-- Tabulator -->
    <link
      href="https://unpkg.com/tabulator-tables@6.3.0/dist/css/tabulator.min.css"
      rel="stylesheet" />
    <link rel="stylesheet" href="./CSS/estilostablaprod.css" />
  </head>
  <body>
    <h1>Inventario de productos</h1>

    <form action="" method="GET">
      <input
        type="search"
        id="buscar-producto"
        name="buscar-producto"
        placeholder="Escribe aquí el nombre del producto (ejm: pioquinto)"
        style="width: 400px" />
      <button type="button">Buscar</button>
    </form>

    <p>Filtrar por:</p>
    <select name="tipo-prod" id="tipo-prod">
      <option value="">Tipo de producto</option>
    </select>

    <div class="contenedor-tabla">
      <div id="tablaProductos"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/tabulator-tables@6.3.0/dist/js/tabulator.min.js"></script>
    <script src="./JavaScript/productos.js"></script>
  </body>
</html>
