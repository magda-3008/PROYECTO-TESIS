<!DOCTYPE html>
<html lang="es">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>♥ Pa'tuboca</title>
  <link rel="stylesheet" href="./CSS/estilosentrada.css">
  <!-- Fuente -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>
<body>
  <main class="login-container">

    <!-- Logo -->
    <div class="logo-container"><img src="Resources/Logo.png" alt="Logo de Pa'tuboca" class="logo-img"></div>
    <h2>BIENVENIDA</h2>
   
    <form id="loginForm">
      <!-- Usuario -->
      <div class="input-group">
        <label for="username">👤 USUARIO:</label>
        <input type="text" id="username" placeholder="Ingresa tu usuario" required>
      </div>

      <!-- Contraseña -->
      <div class="input-group">
        <label for="password">🗝️ CONTRASEÑA:
          <div class="password-container">
            <input type="password" id="password" placeholder="Ingresa tu contraseña" required>
            <button type="button" id="togglePassword" class="btn-ojo"><i class="bi bi-eye"></i></button>
          </div>
        </label>
      </div>

      <!-- Mensaje -->
      <p id="mensajeLogin" class="mensaje-login"></p>

      <!-- Botón -->
      <div class="button-container">
        <button type="submit" class="btn-login">Iniciar sesión</button>
      </div>
    </form>
  </main>

  <script src="./JavaScript/login.js"></script>

</body>
</html>
