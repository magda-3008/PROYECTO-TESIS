<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous" />
  </head>
  <body>
    <h1>Página en construcción, regrese mas tarde</h1>
    <img
      src="./Resources/enconstruccion.jpg"
      width="500px"
      height="auto"
      style="padding-bottom: 50px" />

      <a href="login.html">Ir al login</a>

    <table class="table">
      <thead>
        <tr>
          <th scope="col">Nº</Nav></th>
          <th scope="col">Nombre</th>
          <th scope="col">Tipo</th>
          <th scope="col">Precio</th>
          <th scope="col">Margen de ganancia bruta</th>
          <th scope="col">Estado</th>
        </tr>
      </thead>
      <tbody id="tablaProductos">
      </tbody>
    </table>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"></script>

      <script>
async function cargarProductos() {

    const respuesta = await fetch("/api/productos");

    const productos = await respuesta.json();

    const tabla = document.getElementById("tablaProductos");

    productos.forEach(producto => {

        tabla.innerHTML += `
            <tr>
                <td>${producto.id_producto}</td>
                <td>${producto.nombre}</td>
                <td>${producto.tipo}</td>
                <td>${producto.precio_venta}</td>
                <td>${producto.margen_gananciab_esperado}</td>
                <td>${producto.estado}</td>
            </tr>
        `;

    });

}

cargarProductos();
</script>
  </body>
</html>
