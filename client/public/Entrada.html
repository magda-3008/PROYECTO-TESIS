<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>♥ Pa'tuboca</title>
    <link rel="stylesheet" href="./CSS/estilosentrada.css">
    <!-- Fuentes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>
<body>

    <main class="Contenedor-general">

        <!-- Logo -->
        <div class="Contenedor-logo">
            <img src="Resources/Logo.png" alt="Logo de Pa'tuboca" class="logo-img">
        </div>

        <h2>Bienvenida</h2>

        <!-- Formulario cuadrado y sus elementos -->
        <form action="#">

            <div class="Titulo-caja">
                <label for="username">Usuario</label>
                <input type="text" id="username" placeholder="👤Ingrese su usuario" required>
            </div>

            <div class="Titulo-caja">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="🗝️Ingrese su contraseña" required>
            </div>

            <!-- Botón de inicio de sesión-->
            <div class="Redondo">
                <a href="Principal.html" class="btn-login">
                    Iniciar sesión
                </a>
            </div>

        </form>

    </main>

</body>
</html>
