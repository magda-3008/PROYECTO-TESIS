<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recetas</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet" />
  </head>

  <body>
    <p>Recetas</p>
    <form action="" method="GET">
      <input
        type="search"
        id="buscar-receta"
        name="buscar-receta"
        placeholder="Escribe aquí el nombre de la receta (ejm: gelatina)"
        style="width: 400px" />
      <button type="submit">Buscar</button>
    </form>

    <p>Filtrar por:</p>
    <select name="ingrediente" id="ingrediente">
      <option>Ingrediente</option>
    </select>

    <div id="contenedor-recetas"></div>

    <script src="./JavaScript/recetas.js"></script>
  </body>
</html>
