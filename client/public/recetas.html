<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recetas</title>
    <link rel="stylesheet" href="./CSS/estilosreceta.css" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet" />
  </head>

  <body>
    <p>Recetas</p>
    <form action="" method="GET">
      <input
        type="search"
        id="buscar-receta"
        name="buscar-receta"
        placeholder="Escribe aquí el nombre de la receta (ejm: gelatina)"
        style="width: 400px" />
      <button type="button">Buscar</button>
    </form>

    <p>Filtrar por:</p>
    <select name="ingrediente" id="ingrediente">
      <option value="">Ingrediente</option>
    </select>

    <div class="container mt-4">
      <div id="contenedor-recetas" class="row justify-content-center g-4"></div>
    </div>

    <!-- Modal de recetas. Muestra información de cada una -->
    <div
      class="modal fade"
      id="modalReceta"
      tabindex="-1"
      aria-labelledby="modalRecetaLabel"
      aria-hidden="true">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h2
              class="modal-title titulo-modal"
              id="tituloModal"
              style="text-align: center"></h2>

            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body" id="contenidoModal"></div>
        </div>
      </div>
    </div>

    <script src="./JavaScript/utilities/formateoUnidad.js"></script>
    <script src="./JavaScript/recetas.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"></script>
  </body>
</html>
