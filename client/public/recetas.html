<!doctype html>
<html lang="es">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>♥ Pa'TuBoca</title>
  <link rel="stylesheet" href="./CSS/estilosrecetas.css" />
  <!-- Fuentes -->
  <link rel="stylesheet"href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700&display=swap"rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />

</head>
<body>
  <div class="Fondo"></div>

  <!-- Menú lateral vertical -->
  <aside class="Menu-lateral" id="menuLateral">
    <nav>

      <div class="Seccion-menu">GESTIÓN</div>
      <a href="#" class="Item-menu"><i class="fa-solid fa-box-open"></i><span>Productos</span></a>
      <a href="#" class="Item-menu"><i class="fa-solid fa-carrot"></i><span>Ingredientes</span></a>
      <a href="#" class="Item-menu"><i class="fa-solid fa-book-open"></i><span>Recetas</span></a>
      <hr>
      <div class="Seccion-menu">TABLERO DE CONTROL</div>
      <a href="Ventas.html" class="Item-menu activo"><i class="fa-solid fa-cash-register"></i><span>Ventas</span></a>
      <a href="#" class="Item-menu"><i class="fa-solid fa-sack-dollar"></i><span>Costos y Rentabilidad</span></a>

    </nav>
  </aside>
  
  <!-- Encabezado rosa horizontal general -->
  <header class="Encabezado">
    <!-- Lado izquierdo -->
    <div class="Encabezado-izquierda">

      <!-- Botón menú 3 rayas -->
      <button class="btnMenu" id="btnMenu" aria-label="Abrir menú"><i class="fa-solid fa-bars"></i></button>
      <!-- Marca -->
      <div class="Marca"><h1>Pa'TuBoca | Ventas</h1><p>Delicias y más</p></div>

    </div>

    <!-- Lado derecho -->
    <div class="Encabezado-derecha">
 
      <!-- Botón de agregar venta -->
      <button class="btnVenta" type="button"><i class="fa-solid fa-plus"></i><span>Añadir venta</span></button>
      <!-- Logo de la empresa deberia cerrar sesión-->
      <a href="" id="btnCerrarSesion"><img src="Resources/Logo.png" alt="Logo" class="logoEmpresa"></a>

    </div>
  </header>

  <section class="busqueda-recetas">

    <div class="contenedor-busqueda">

        <div class="campo-busqueda">

            <i class="fa-solid fa-magnifying-glass"></i>

            <input
                type="search"
                id="buscar-receta"
                name="buscar-receta"
                placeholder="Escribe aquí el nombre de la receta (Ej.: Gelatina)" />

        </div>

        <button type="button" class="btnBuscar">
            Buscar
        </button>

    </div>

    <div class="contenedor-filtro">

        <label for="ingrediente">
            Filtrar por:
        </label>

        <select
            name="ingrediente"
            id="ingrediente">

            <option value="">
                Ingrediente
            </option>

        </select>

    </div>

</section>

<div id="contenedor-recetas"></div>


    <!-- Modal de recetas. Muestra información de cada una -->
    <div
      class="modal fade"
      id="modalReceta"
      tabindex="-1"
      aria-labelledby="modalRecetaLabel"
      aria-hidden="true">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h2
              class="modal-title titulo-modal"
              id="tituloModal"
              style="text-align: center"></h2>

            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body" id="contenidoModal"></div>
        </div>
      </div>
    </div>

    <script src="./JavaScript/utilities/formateoUnidad.js"></script>
    <script src="./JavaScript/recetas.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"></script>
  </body>
</html>
